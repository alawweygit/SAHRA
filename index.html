<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#131020">
<title>HYPOX — Party Games</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>"/>
<script src="firebase-config.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="theme-dark">
<div id="app">
  <div id="bg-deco">
    <div class="deco-blob deco-blob-1"></div>
    <div class="deco-blob deco-blob-2"></div>
    <div class="deco-blob deco-blob-3"></div>
    <div class="deco-float" style="left:8%;animation-duration:7s">🎉</div>
    <div class="deco-float" style="left:28%;animation-duration:9s;animation-delay:2s">⭐</div>
    <div class="deco-float" style="left:52%;animation-duration:6.5s;animation-delay:1s">🎊</div>
    <div class="deco-float" style="left:76%;animation-duration:8s;animation-delay:3s">✨</div>
    <div class="deco-float" style="left:91%;animation-duration:7.5s;animation-delay:0.5s">🎈</div>
  </div>
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="55%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs></svg>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="room-pill"><span class="room-code" id="roomCodeText">—</span></div>
    <div class="round-pill display" id="roundPill">HYPOX</div>
    <div style="display:flex;gap:0.8vmin;">
      <button class="bar-btn hidden" id="menuBtn">☰</button>
      <button class="bar-btn hidden" id="skipBtn">Skip ▸</button>
      <button class="bar-btn" id="soundBtn">🔊</button>
      <button class="bar-btn" id="themeBtn">🌙</button>
      <button class="bar-btn" id="langBtn">عر</button>
    </div>
  </div>

  <!-- MENU -->
  <div id="menuOverlay" class="hidden">
    <div class="menu-card">
      <div class="menu-title display">MENU</div>
      <button class="menu-item" id="menuResume">▶ Resume Game</button>
      <button class="menu-item danger" id="menuLeave">✕ Leave Game</button>
      <button class="bar-btn" id="menuClose" style="margin-top:1vmin">Cancel</button>
    </div>
  </div>

  <!-- SCREEN 1: TITLE — hero landing -->
  <div class="screen active" id="scr-title">
    <div class="hero">
      <div class="logo-letters display hero-logo">
        <span class="logo-lt" style="--i:0">H</span><span class="logo-lt" style="--i:1">Y</span><span class="logo-lt" style="--i:2">P</span><span class="logo-lt" style="--i:3">O</span><span class="logo-lt" style="--i:4">X</span>
      </div>
      <h1 class="hero-headline display" id="heroHeadline">The Party Starts Here</h1>
      <p class="hero-sub" id="heroSub">Games your friends will actually fight over. No apps, no downloads — just phones and chaos.</p>
      <div class="hero-ctas">
        
        <button class="big-btn ghost" id="joinBtn">JOIN A GAME</button>
      </div>
    </div>
    <div class="title-games-label display" id="tapLabel">PICK YOUR GAME</div>
    <div class="title-game-grid" id="titleGameGrid"></div>
  </div>

  <!-- SCREEN 2: PREGAME -->
  <div class="screen" id="scr-pregame">
    <div id="pregameInner" class="pregame-inner"></div>
    <button class="bar-btn" id="backFromPregame" style="margin-top:1.5vmin">← Back</button>
  </div>

  <!-- SCREEN 3: AVATAR -->
  <div class="screen" id="scr-avatar">
    <div class="pick-title display" id="avatarTitle">PICK YOUR AVATAR</div>
    <div class="avatar-grid" id="avatarGrid"></div>
    <input class="text-input" id="avatarName" maxlength="14" placeholder="Your name" style="text-align:center;margin-top:1vmin;">
    <button class="big-btn" id="avatarDone">Let's Go →</button>
    <button class="bar-btn" id="backFromAvatar">← Back</button>
  </div>

  <!-- SCREEN 4: LOBBY -->
  <div class="screen" id="scr-lobby">
    <div class="lobby-title display">WAITING FOR PLAYERS…</div>
    <div id="joinHint"></div>
    <div id="playerRow"></div>
    <div class="local-add hidden" id="localAdd">
      <button class="big-btn" id="addLocalBtn" style="font-size:clamp(14px,2.2vmin,19px);padding:1.4vmin 3vmin;">+ Add Player</button>
    </div>
    <button class="big-btn dim" id="startGameBtn">START GAME</button>
    <div id="lobbyHint" style="font-size:clamp(11px,1.7vmin,14px);color:var(--text3);font-weight:700;min-height:1.5em;"></div>
  </div>

  <!-- SCREEN 5: JOIN -->
  <div class="screen" id="scr-join">
    <div class="pick-title display">JOIN A GAME</div>
    <div class="join-form">
      <input class="text-input" id="joinCode" maxlength="4" placeholder="Room code" autocomplete="off" style="text-align:center;letter-spacing:6px;font-family:'Fredoka One',sans-serif;">
      <input class="text-input" id="joinName" maxlength="14" placeholder="Your name" autocomplete="off">
      <div class="join-avatar-row" id="joinAvatarRow"></div>
      <button class="big-btn" id="joinGo">Join →</button>
      <div class="join-err" id="joinErr"></div>
    </div>
    <button class="bar-btn" id="backFromJoin" style="margin-top:1vmin">← Back</button>
  </div>

  <!-- SCREEN 6: CONTROLLER -->
  <div class="screen" id="scr-controller">
    <div id="phoneMirror" class="phone-mirror hidden">
      <div class="pm-pill" id="pmPill"></div>
      <div class="pm-headline" id="pmHeadline"></div>
      <div class="pm-laith" id="pmLaith"><span class="pm-laith-face">🎙️</span><span id="pmSpeech"></span></div>
    </div>
    <div id="ctrlArea"></div>
  </div>

  <!-- SCREEN 7: GAME -->
  <div class="screen" id="scr-game">
    <div id="hostStage"></div>
  </div>

  <!-- HOST -->
  <div id="host">
    <div class="host-body">
      <div class="brow l"></div><div class="brow r"></div>
      <div class="eye l"></div><div class="eye r"></div>
      <div class="mouth"></div><div class="bowtie"></div>
    </div>
    <div class="speech"><div class="host-name">LAITH · ليث</div><span id="speechText"></span></div>
  </div>

  <div id="ppOverlay"></div>
  <canvas id="confetti"></canvas>
  <div id="wipe"></div>
</div>
<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/fx.js"></script>
<script src="js/regions.js"></script>
<script src="js/content.js"></script>
<script src="js/net.js"></script>
<script src="js/controller.js"></script>
<script src="js/host.js"></script>
<script src="js/main.js"></script>
</body>
</html>
