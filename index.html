<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#120626">
<title>SAHRA — Party Games · سهرة</title>
<link rel="stylesheet" href="css/style.css">
<!-- Firebase (compat SDK — same style as the padel app) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>
<div id="app">
  <div id="rays"></div>
  <div class="bg-blob" style="width:42vmin;height:42vmin;background:var(--purple);top:-10vmin;left:-8vmin;"></div>
  <div class="bg-blob" style="width:36vmin;height:36vmin;background:var(--magenta);bottom:-8vmin;right:-6vmin;animation-delay:-6s;"></div>
  <div class="bg-blob" style="width:24vmin;height:24vmin;background:var(--cyan);top:20%;right:12%;animation-delay:-3s;opacity:.16;"></div>
  <div id="shapes">
    <div class="f-shape sq" style="width:26px;height:26px;left:8%;animation-duration:19s;"></div>
    <div class="f-shape ci" style="width:20px;height:20px;left:22%;animation-duration:25s;animation-delay:-9s;"></div>
    <div class="f-shape tr" style="left:37%;animation-duration:22s;animation-delay:-4s;"></div>
    <div class="f-shape pl" style="left:52%;animation-duration:27s;animation-delay:-14s;">+</div>
    <div class="f-shape ci" style="width:28px;height:28px;left:66%;animation-duration:20s;animation-delay:-7s;"></div>
    <div class="f-shape sq" style="width:18px;height:18px;left:79%;animation-duration:24s;animation-delay:-17s;"></div>
    <div class="f-shape tr" style="left:91%;animation-duration:21s;animation-delay:-11s;"></div>
    <div class="f-shape pl" style="left:14%;animation-duration:26s;animation-delay:-20s;">+</div>
  </div>
  <div id="grain"></div>
  <div class="vignette"></div>
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dff6a"/><stop offset="55%" stop-color="#ffd23f"/><stop offset="100%" stop-color="#ff3d8a"/>
    </linearGradient>
  </defs></svg>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="room-pill"><span data-i18n="room">ROOM</span> <span class="room-code" id="roomCodeText">—</span></div>
    <div class="round-pill" id="roundPill">SAHRA</div>
    <div style="display:flex;gap:1vmin;">
      <button class="bar-btn hidden" id="skipBtn" data-i18n="skip">SKIP ▸</button>
      <button class="bar-btn" id="soundBtn" title="Sound">🔊</button>
    </div>
  </div>

  <!-- LANGUAGE PICKER (first screen) -->
  <div class="screen active" id="scr-lang">
    <div class="marquee">
      <div class="logo display">
        <span class="lt" style="--i:0">S</span><span class="lt" style="--i:1">A</span><span class="lt" style="--i:2">H</span><span class="lt" style="--i:3">R</span><span class="lt" style="--i:4">A</span>
      </div>
      <div class="logo-sub">سهرة</div>
    </div>
    <div class="pick-title display" data-i18n="choose_lang">CHOOSE YOUR LANGUAGE</div>
    <div class="lang-choices">
      <button class="lang-card" data-lang="en">
        <div class="lang-flag">🇬🇧</div>
        <div class="lang-word display">English</div>
      </button>
      <button class="lang-card" data-lang="ar">
        <div class="lang-flag">🇸🇦</div>
        <div class="lang-word display" style="font-family:'Lalezar',sans-serif;">العربية</div>
      </button>
    </div>
  </div>

  <!-- REGION PICKER -->
  <div class="screen" id="scr-region">
    <div class="pick-title display" data-i18n="choose_region">WHERE ARE YOU PLAYING?</div>
    <div class="pick-sub" data-i18n="region_hint"></div>
    <div class="region-grid">
      <button class="region-card" data-region="mena"><div class="region-emoji">🕌</div><div class="region-name display" data-i18n="region_mena">Middle East</div></button>
      <button class="region-card" data-region="weur"><div class="region-emoji">🗽</div><div class="region-name display" data-i18n="region_weur">USA &amp; Europe</div></button>
      <button class="region-card" data-region="asia"><div class="region-emoji">🏯</div><div class="region-name display" data-i18n="region_asia">Asia</div></button>
      <button class="region-card" data-region="africa"><div class="region-emoji">🦁</div><div class="region-name display" data-i18n="region_africa">Africa</div></button>
      <button class="region-card wide" data-region="global"><div class="region-emoji">🌍</div><div class="region-name display" data-i18n="region_global">Mix It Up (Global)</div></button>
    </div>
    <button class="bar-btn" id="regionBack" data-i18n="back" style="margin-top:1vmin;">Back</button>
  </div>

  <!-- TITLE -->
  <div class="screen" id="scr-title">
    <div class="marquee">
      <div class="logo display">
        <span class="lt" style="--i:0">S</span><span class="lt" style="--i:1">A</span><span class="lt" style="--i:2">H</span><span class="lt" style="--i:3">R</span><span class="lt" style="--i:4">A</span>
      </div>
      <div class="logo-sub">سهرة</div>
      <div class="tagline" data-i18n="tagline">THE AI-POWERED PARTY NIGHT</div>
    </div>
    <div class="play-modes">
      <button class="play-card" id="hostBtn">
        <div class="play-emoji">📺</div>
        <div class="play-name display" data-i18n="mode_tv">TV + Phones</div>
        <div class="play-desc" data-i18n="mode_tv_sub">Big screen shows the game, phones are controllers</div>
      </button>
      <button class="play-card feature" id="phonesBtn">
        <div class="play-emoji">📱</div>
        <div class="play-name display" data-i18n="mode_phones">Phones Only</div>
        <div class="play-desc" data-i18n="mode_phones_sub">No TV — everyone plays on their own phone</div>
      </button>
      <button class="play-card" id="offlineBtn">
        <div class="play-emoji">🤝</div>
        <div class="play-name display" data-i18n="mode_pass">One Device</div>
        <div class="play-desc" data-i18n="mode_pass_sub">Pass &amp; play on a single phone, no internet</div>
      </button>
    </div>
    <div class="title-foot">
      <button class="big-btn alt" id="joinBtn" data-i18n="join_game" style="font-size:clamp(15px,2.4vmin,22px);padding:1.5vmin 4vmin;">JOIN A GAME</button>
      <button class="bar-btn" id="regionBadge">🌍</button>
    </div>
  </div>

  <!-- LOBBY (host) -->
  <div class="screen" id="scr-lobby">
    <div class="lobby-title display" data-i18n="waiting_players">WAITING FOR PLAYERS…</div>
    <div class="join-line" id="joinHint" data-i18n="join_hint"></div>
    <div id="playerRow"></div>
    <div class="local-add hidden" id="localAdd">
      <input class="text-input" id="localName" maxlength="14" data-i18n-ph="player_name" placeholder="Your name">
      <button class="big-btn alt" id="addLocalBtn" data-i18n="add_player" style="font-size:clamp(14px,2.2vmin,20px);padding:1.4vmin 3vmin;">ADD PLAYER</button>
    </div>
    <button class="big-btn dim" id="startGameBtn" data-i18n="start_game">START</button>
    <div class="hint" id="lobbyHint"></div>
  </div>

  <!-- JOIN (phone) -->
  <div class="screen" id="scr-join">
    <div class="lobby-title display" data-i18n="join_game">JOIN A GAME</div>
    <div class="join-form">
      <input class="text-input" id="joinCode" maxlength="4" data-i18n-ph="enter_code" placeholder="Room code" autocomplete="off">
      <input class="text-input" id="joinName" maxlength="14" data-i18n-ph="player_name" placeholder="Your name" autocomplete="off">
      <button class="big-btn" id="joinGo" data-i18n="join_btn">JOIN</button>
      <div class="join-err" id="joinErr"></div>
    </div>
  </div>

  <!-- CONTROLLER (phone, in-game) -->
  <div class="screen" id="scr-controller">
    <div id="phoneMirror" class="phone-mirror hidden">
      <div class="pm-pill" id="pmPill"></div>
      <div class="pm-headline" id="pmHeadline"></div>
      <div class="pm-laith" id="pmLaith"><span class="pm-laith-face">🎙️</span><span id="pmSpeech"></span></div>
    </div>
    <div id="ctrlArea"></div>
  </div>

  <!-- GAME (host main screen) -->
  <div class="screen" id="scr-game">
    <div id="hostStage"></div>
  </div>

  <!-- HOST CHARACTER -->
  <div id="host">
    <div class="host-body">
      <div class="brow l"></div><div class="brow r"></div>
      <div class="eye l"></div><div class="eye r"></div>
      <div class="mouth"></div>
      <div class="bowtie"></div>
    </div>
    <div class="speech">
      <div class="host-name">LAITH · ليث</div>
      <span id="speechText"></span>
    </div>
  </div>

  <!-- PASS & PLAY OVERLAY -->
  <div id="ppOverlay"></div>

  <canvas id="confetti"></canvas>
  <div id="wipe"></div>
</div>

<script src="js/i18n.js"></script>
<script src="js/audio.js"></script>
<script src="js/fx.js"></script>
<script src="js/regions.js"></script>
<script src="js/content.js"></script>
<script src="js/net.js"></script>
<script src="js/controller.js"></script>
<script src="js/host.js"></script>
<script src="js/main.js"></script>
</body>
</html>
